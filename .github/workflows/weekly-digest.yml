name: Weekly AV Digest

# Runs the digest generator on a cron schedule, plus on-demand via workflow_dispatch.
# - 8:00 AM ET Monday = 12:00 UTC Monday (during EST/winter) or 13:00 UTC (EDT/summer)
# - We use 12:00 UTC year-round; the digest will arrive between 7-8 AM ET depending on DST.
on:
  schedule:
    - cron: "0 12 * * 1"  # Mondays at 12:00 UTC
  workflow_dispatch:
    inputs:
      force:
        description: "Force regeneration even if a recent digest exists"
        required: false
        default: "false"
        type: choice
        options:
          - "false"
          - "true"

permissions:
  contents: write  # needed to commit the digest back to the repo

concurrency:
  group: weekly-digest
  cancel-in-progress: false

jobs:
  generate:
    name: Generate digest
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"
          cache-dependency-path: scripts/requirements.txt

      - name: Install dependencies
        run: pip install -r scripts/requirements.txt

      - name: Generate digest
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          FORCE_RUN: ${{ github.event.inputs.force == 'true' && '1' || '0' }}
        run: python scripts/generate_digest.py

      - name: Commit and push if changed
        run: |
          set -euo pipefail
          git config user.name "autonomy-brief-bot"
          git config user.email "autonomy-brief-bot@users.noreply.github.com"

          if [[ -z "$(git status --porcelain digests/ data/)" ]]; then
            echo "No changes to commit (digest was likely skipped by guard)."
            exit 0
          fi

          DATE=$(date -u +%Y-%m-%d)
          git add digests/ data/
          git commit -m "Weekly AV digest: $DATE"

          # Try to push. If rejected (another concurrent run beat us),
          # check whether today's digest already exists on remote and exit cleanly.
          if git push 2>&1; then
            echo "Pushed successfully."
            exit 0
          fi

          echo "Push was rejected. Checking if another run already pushed today's digest..."
          git fetch origin main
          if git ls-tree -r origin/main --name-only | grep -qx "digests/weekly-av/${DATE}.md"; then
            echo "✓ Remote already contains digests/weekly-av/${DATE}.md — another run beat us. Exiting cleanly (not a real failure)."
            exit 0
          fi

          echo "Push failed and remote does not have today's digest. Attempting rebase + push as fallback..."
          git pull --rebase origin main
          git push
          echo "Recovered with rebase + push."
